version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
    groups:
      cli-and-config:
        patterns:
          - "clap*"
          - "serde*"
          - "serde_json"
          - "anyhow"
          - "thiserror"
      runtime:
        patterns:
          - "tokio*"
          - "sysinfo"
          - "global-hotkey"
          - "colored"
          - "tracing*"
      windows:
        patterns:
          - "winapi*"
          - "windows*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
